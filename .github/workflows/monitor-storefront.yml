name: Monitor Storefront

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run uptime + token monitor
        env:
          SITE_URL: ${{ vars.SITE_URL }}
          MONITORING_CRON_KEY: ${{ vars.MONITORING_CRON_KEY }}
          ALERT_WEBHOOK_URL: ${{ vars.ALERT_WEBHOOK_URL }}
        run: npm run monitor:prod
